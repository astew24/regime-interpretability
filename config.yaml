data:
  # Using ratios keeps the pipeline simple, although exact date cutoffs would be cleaner
  # if I wanted to lock the split boundaries to calendar periods.
  tickers:
    - SPY
    - QQQ
    - IWM
    - XLF
    - XLE
    - XLK
    - TLT
    - IEF
    - HYG
    - GLD
    - SLV
    - DBA
    - UUP
    - ^VIX
    - EEM
  start_date: "2015-10-01"
  end_date: "2025-09-30"
  window_size: 20
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

autoencoder:
  input_dim: 300
  hidden_dims:
    - 128
    - 64
  latent_dim: 32
  learning_rate: 0.001
  batch_size: 256
  max_epochs: 200
  patience: 15
  seed: 42

sparse_autoencoder:
  input_dim: 32
  dict_size: 128
  topk: 8
  sparsity_lambda: 0.01
  learning_rate: 0.001
  batch_size: 256
  max_epochs: 150

ablation:
  latent_dims:
    - 16
    - 32
    - 64
  topk_values:
    - 4
    - 8
    - 12
    - 16
  dict_sizes:
    - 64
    - 128
    - 256
  window_sizes:
    - 10
    - 20
    - 40
  sparsity_lambdas:
    - 0.001
    - 0.01
    - 0.05
    - 0.1

paths:
  data_dir: "data/processed"
  results_dir: "results"
  checkpoint_dir: "results/checkpoints"
